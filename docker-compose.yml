services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sanctuaryclub
      POSTGRES_USER: sanctuary
      POSTGRES_PASSWORD: sanctuary
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanctuary -d sanctuaryclub"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://sanctuary:sanctuary@db:5432/sanctuaryclub
      # Schema is managed by Alembic migrations in Docker, not create_all
      AUTO_CREATE_TABLES: "0"
      SECRET_KEY: change-me-in-production
      # ADMIN_EMAIL / ADMIN_PASSWORD can be overridden here
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
