{% extends "base.html" %}
{% block title %}Reset password — SanctuaryClub{% endblock %}
{% block anon_content %}
<div class="card">
  <h2 style="margin-bottom:.2rem;">Set a new password</h2>
  <p class="muted" style="margin-top:0;">At least 8 characters with letters and numbers.</p>
  <form method="post" action="/reset-password">
    <input type="hidden" name="token" value="{{ token }}">
    <label>New password <input type="password" name="password" required minlength="8" autocomplete="new-password">
      {% if errors and errors.password %}<span class="field-error">{{ errors.password }}</span>{% endif %}</label>
    <label>Confirm password <input type="password" name="confirm" required autocomplete="new-password">
      {% if errors and errors.confirm %}<span class="field-error">{{ errors.confirm }}</span>{% endif %}</label>
    <button class="btn primary block">Update password</button>
  </form>
</div>
{% endblock %}
