{% extends "base.html" %}
{% block title %}Forgot password — SanctuaryClub{% endblock %}
{% block anon_content %}
<div class="card">
  <h2 style="margin-bottom:.2rem;">Forgot your password?</h2>
  <p class="muted" style="margin-top:0;">Enter your email and we'll send a reset link.</p>
  <form method="post" action="/forgot-password">
    <label>Email <input type="email" name="email" required autofocus placeholder="you@example.com"></label>
    <button class="btn primary block">Send reset link</button>
  </form>
  <p style="text-align:center; margin:.8rem 0 0;"><a href="/login">← Back to sign in</a></p>
</div>
{% endblock %}
